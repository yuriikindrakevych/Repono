<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); }
  .wrap { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: var(--fs-mono-xs); letter-spacing: var(--ls-overline);
         text-transform: uppercase; color: var(--text-subtle); width: 104px; flex: none; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { Badge, Heartbeat, Tag } = window.ReponoDesignSystem_7d8df0;
  function Demo() {
    return (
      <React.Fragment>
        <div className="row">
          <span className="lbl">Version</span>
          <Badge tone="version">v2.4.1</Badge>
          <Badge tone="version">v3.0.0-rc.2</Badge>
          <Badge tone="version">build 1182</Badge>
          <Badge tone="accent">latest</Badge>
          <Badge tone="neutral">Drupal 10</Badge>
        </div>
        <div className="row">
          <span className="lbl">Status</span>
          <Badge tone="active" dot>active</Badge>
          <Badge tone="warn" dot>renews soon</Badge>
          <Badge tone="error" dot>payment failed</Badge>
        </div>
        <div className="row">
          <span className="lbl">Heartbeat</span>
          <Heartbeat status="active" meta="12s ago" />
          <Heartbeat status="stale" label="last seen" meta="4h ago" />
          <Heartbeat status="down" meta="no check-in 6d" />
        </div>
        <div className="row">
          <span className="lbl">Tags</span>
          <Tag mono>drupal/core ^10.2</Tag>
          <Tag selected onClick={()=>{}}>WordPress</Tag>
          <Tag mono>PHP 8.2</Tag>
          <Tag onRemove={()=>{}}>composer</Tag>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
