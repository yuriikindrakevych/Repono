<!-- @dsCard group="Colors" viewport="700x180" name="Neutral ink ramp" subtitle="Cool blue-grays — the page, surfaces, hairlines & text. Not creamy." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .ramp { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0;
    border: 1px solid var(--border-default); border-radius: var(--radius-md); overflow: clip; }
  .sw { height: 84px; display: flex; align-items: flex-end; padding: 8px; }
  .lab { font-family: var(--font-mono); font-size: 10px; line-height: 1.35; }
  .meta { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0; margin-top: 8px; }
  .meta div { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); padding: 0 2px; }
  .meta b { display:block; color: var(--text-strong); font-weight: 500; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--ink-800)"><span class="lab" style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="lab" style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--ink-500)"><span class="lab" style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--ink-300)"><span class="lab" style="color:#fff">300</span></div>
    <div class="sw" style="background:var(--ink-150)"><span class="lab" style="color:var(--ink-700)">150</span></div>
    <div class="sw" style="background:var(--ink-75)"><span class="lab" style="color:var(--ink-700)">75</span></div>
    <div class="sw" style="background:var(--ink-50)"><span class="lab" style="color:var(--ink-700)">50</span></div>
    <div class="sw" style="background:var(--white);box-shadow:inset 0 0 0 1px var(--border-default)"><span class="lab" style="color:var(--ink-700)">white</span></div>
  </div>
  <div class="meta">
    <div><b>#171B21</b>ink</div>
    <div><b>#2A2F37</b>body</div>
    <div><b>#5A636E</b>muted</div>
    <div><b>#9AA2AC</b>disabled</div>
    <div><b>#DCE1E6</b>hairline</div>
    <div><b>#EEF1F4</b>sunken</div>
    <div><b>#F4F6F8</b>page</div>
    <div><b>#FFFFFF</b>card</div>
  </div>
</body>
</html>
