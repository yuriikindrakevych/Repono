<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid — consistent rhythm, no arbitrary values" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); display: grid; gap: 10px; }
  .row { display: grid; grid-template-columns: 64px 1fr; align-items: center; gap: 14px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .bar { height: 14px; background: var(--accent); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><span class="name">space-1</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">space-2</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">space-3</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">space-4</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">space-6</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">space-8</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">space-12</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">space-16</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
