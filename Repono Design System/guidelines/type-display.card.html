<!-- @dsCard group="Type" viewport="700x300" name="Display scale — Geist" subtitle="Modern grotesque, tight negative tracking. Hero → section titles." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); display: grid; gap: 14px; }
  .spec { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px;
    border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px; }
  .spec:last-child { border-bottom: none; }
  .t { font-family: var(--font-display); color: var(--text-strong); font-weight: 600; letter-spacing: -0.02em; line-height: 1.05; }
  .m { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); white-space: nowrap; }
</style>
</head>
<body>
  <div class="spec"><span class="t" style="font-size:56px">Install once. Update forever.</span><span class="m">display-xl · 56 / 600</span></div>
  <div class="spec"><span class="t" style="font-size:34px">A registry for the modules you sell</span><span class="m">display-md · 34 / 600</span></div>
  <div class="spec"><span class="t" style="font-size:21px">Subscriptions, licenses & keys</span><span class="m">title · 21 / 600</span></div>
</body>
</html>
